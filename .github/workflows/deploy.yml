name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Build Frontend'
        run: |
          cd frontend
          npm install
          REACT_APP_API_URL=https://todo-backend-farah.azurewebsites.net npm run build

      - name: 'Login via Azure CLI'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 'Deploy Frontend to Azure'
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'todo-frontend-farah'
          package: './frontend/build'